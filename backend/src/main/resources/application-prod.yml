server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  upload-dir: ${APP_UPLOAD_DIR:/app/uploads}
  upload-url-prefix: ${APP_UPLOAD_URL_PREFIX:/api/uploads/}
  admin-nicknames: ${APP_ADMIN_NICKNAMES:superadmin}
  admin-code: ${APP_ADMIN_CODE}
