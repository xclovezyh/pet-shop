server:
  port: 8080
  error:
    include-message: always
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/pet_shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  upload-dir: uploads
  upload-url-prefix: /api/uploads/
  admin-nicknames: ${APP_ADMIN_NICKNAMES:superadmin}
  admin-code: ${APP_ADMIN_CODE:change-me-admin-code}
