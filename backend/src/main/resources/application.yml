server:
  port: 8080
  error:
    include-message: always
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/pet_shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  upload-dir: uploads
  upload-url-prefix: /api/uploads/
  admin-usernames: ${APP_ADMIN_USERNAMES:${APP_ADMIN_NICKNAMES:superadmin}}
  admin-password: ${APP_ADMIN_PASSWORD:change-me-admin-password}
  user-jwt-secret: ${APP_USER_JWT_SECRET:change-me-user-jwt-secret}
  user-jwt-hours: ${APP_USER_JWT_HOURS:6}
